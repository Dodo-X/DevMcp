# DevPartner MCP Server - Docker Compose
# 本地开发/测试用
#
# 启动: docker-compose up -d
# 停止: docker-compose down
# 日志: docker-compose logs -f
# 重建: docker-compose up -d --build

version: "3.8"

services:
  devpartner:
    build:
      context: .
      dockerfile: Dockerfile
    image: devpartner:latest
    container_name: devpartner-mcp
    restart: unless-stopped

    # ModelScope 创空间仅支持 7860 或 8080
    ports:
      - "7860:7860"

    # 持久化数据目录（重要！容器重启不丢数据）
    volumes:
      - ./data:/app/data

    environment:
      - MCP_PORT=7860
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # 资源限制（可选）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
