name: Feature Request / 需求建议
description: 提出一个新功能或改进建议
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题背景 (Problem)
      description: 当前缺少什么能力，导致什么痛点
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案建议 (Proposal)
      description: 期望如何解决这个问题
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 影响范围 (Scope)
      description: 涉及的模块、接口、数据库变更
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准 (Acceptance)
      placeholder: |
        - [ ] ...
        - [ ] ...
