name: 🚀 Deploy to ModelScope

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'MODELSCOPE_DEPLOY.md'
      - '.idea/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout GitHub
        uses: actions/checkout@v4

      - name: 🚀 Push to ModelScope
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          REPO_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/Pisces43/Dev-partner.git"
          
          # 克隆到 workspace 外的临时目录，避免 cp 递归自身
          TEMP_DIR=$(mktemp -d)
          echo "克隆 ModelScope 仓库 → ${TEMP_DIR}..."
          git clone "${REPO_URL}" "${TEMP_DIR}/repo"
          cd "${TEMP_DIR}/repo"
          
          echo "清空仓库内容（保留 .git）..."
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          echo "复制 GitHub 最新代码..."
          shopt -s dotglob
          for item in "${GITHUB_WORKSPACE}"/* "${GITHUB_WORKSPACE}"/.*; do
            base=$(basename "${item}")
            [ "${base}" = "." ] || [ "${base}" = ".." ] || [ "${base}" = ".git" ] && continue
            cp -r "${item}" .
          done
          
          echo "提交并推送..."
          git add -A
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过推送。"
          else
            git commit -m "sync: update from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin master
            echo ""
            echo "=========================================="
            echo "  代码已推送到 ModelScope 创空间 ✅"
            echo "=========================================="
            echo "  Studio: Pisces43/Dev-partner"
            echo "  URL:    https://modelscope.cn/studios/Pisces43/Dev-partner"
            echo "=========================================="
          fi
          
          # 清理临时目录
          rm -rf "${TEMP_DIR}"
