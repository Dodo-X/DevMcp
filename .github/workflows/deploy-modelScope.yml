name: 🚀 Deploy to ModelScope

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'MODELSCOPE_DEPLOY.md'
      - '.idea/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 Push to ModelScope
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          REPO_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/Pisces43/Dev-partner.git"

          echo "同步 ModelScope 仓库..."
          git remote add modelscope "${REPO_URL}" || true
          git fetch modelscope master || echo "首次推送，ModelScope 仓库无 master 分支"

          # 合并历史（允许无关历史合并）
          if git rev-parse --verify modelscope/master >/dev/null 2>&1; then
            echo "合并 ModelScope 现有历史..."
            git merge modelscope/master --allow-unrelated-histories -m "merge: sync with ModelScope" || true
          fi

          echo "推送到 ModelScope..."
          git push modelscope master:master

          echo ""
          echo "=========================================="
          echo "  代码已推送到 ModelScope 创空间"
          echo "=========================================="
          echo "  Studio: Pisces43/Dev-partner"
          echo "  URL:    https://modelscope.cn/studios/Pisces43/Dev-partner"
          echo ""
          echo "  ModelScope 将自动检测代码变更并重新部署。"
          echo "=========================================="
