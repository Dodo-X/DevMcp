name: 🚀 Deploy to ModelScope

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'MODELSCOPE_DEPLOY.md'
      - '.idea/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout GitHub
        uses: actions/checkout@v4

      - name: 🚀 Push to ModelScope
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          REPO_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/Pisces43/Dev-partner.git"
          
          echo "克隆 ModelScope 仓库..."
          git clone "${REPO_URL}" modelscope-temp
          cd modelscope-temp
          
          echo "清空 ModelScope 仓库内容（保留 .git）..."
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          echo "复制 GitHub 最新代码..."
          shopt -s dotglob
          cp -r ../* .  2>/dev/null || true
          # 确保不覆盖 ModelScope 的 .git
          cp -r ../.* . 2>/dev/null || true
          
          # 删除可能复制过来的 GitHub .git
          rm -rf .github/workflows/deploy-modelScope.yml.bak 2>/dev/null || true
          
          echo "提交并推送..."
          git add -A
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过推送。"
          else
            git commit -m "sync: update from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin master
            echo ""
            echo "=========================================="
            echo "  代码已推送到 ModelScope 创空间 ✅"
            echo "=========================================="
            echo "  Studio: Pisces43/Dev-partner"
            echo "  URL:    https://modelscope.cn/studios/Pisces43/Dev-partner"
            echo "=========================================="
          fi
