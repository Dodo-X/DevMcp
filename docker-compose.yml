# DevPartner MCP Server - Docker Compose v7.3.0
# 容器化部署配置
#
# 🎯 适用环境: 本地 Docker / ModelScope 云端
# 📋 使用说明:
#   - 本地开发请直接运行 python server.py 或 start.bat
#   - 推理由宿主机 Ollama 提供（HTTP API），容器内不存放模型
#
# ✨ v7.3.0 特性:
#   - 推理引擎迁移至 Ollama（移除 GGUF / llama-cpp-python）
#   - 使用 Streamable HTTP 模式（/mcp 端点）
#   - 数据持久化到宿主机 Volume
#
# ⚠️ 重要提示:
#   运行前请确保宿主机已运行 Ollama 并拉取模型（ollama pull qwen3）！
#   如 Ollama 不在本机，设置 OLLAMA_BASE_URL 环境变量指向其地址。
#
# 命令速查:
#   启动:   docker-compose up -d --build
#   停止:   docker-compose down
#   日志:   docker-compose logs -f devpartner
#   重启:   docker-compose restart devpartner
#   重建:   docker-compose up -d --build

version: "3.8"

services:
  devpartner:
    build:
      context: .
      dockerfile: Dockerfile
    image: devpartner:v7.3.0
    container_name: devpartner
    restart: unless-stopped

    # MCP 服务端口
    ports:
      - "7860:7860"

    # 持久化目录挂载
    volumes:
      # 运行时数据（对话记录、日志、知识库等）
      - ./data:/app/data

    environment:
      - MCP_PORT=7860
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # v7.3.0: Ollama 服务地址（宿主机运行时用 host.docker.internal；同机可为 http://localhost:11434）
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # v7.3.0: Streamable HTTP 模式标识
      - TRANSPORT_MODE=streamable-http

      # ===== ModelScope 自动下载配置 (可选) =====
      # 获取 Token: https://modelscope.cn/my/myaccesstoken
      # - MODELSCOPE_TOKEN=your_token_here          # API Token (访问私有模型必需)
      # - MODELSCOPE_MODEL_ID=Pisces43/Dev-partner-model  # 模型 ID (默认值)

    # 健康检查（使用独立脚本）
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # 资源限制（根据实际需求调整）
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G