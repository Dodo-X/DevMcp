# DevPartner MCP Server - Docker Compose v6.0
# ModelScope 云端部署专用配置
#
# 🎯 适用环境: ModelScope Docker 创空间（唯一用途）
# 📋 使用说明:
#   - 此文件仅用于 ModelScope 云端部署
#   - 本地开发请直接运行 python server.py 或 start.bat
#
# ✨ v6.0 特性:
#   - 统一从 /app/models/ 目录加载模型（通过 Dataset volume 挂载）
#   - 使用 Streamable HTTP 模式（替代 SSE）
#   - 数据和模型持久化到宿主机/Volume
#
# ⚠️ 重要提示:
#   运行前请确保通过 Dataset 挂载了模型文件！
#   或在创空间设置中配置 MODEL_URL 环境变量
#
# 命令速查:
#   启动:   docker-compose up -d --build
#   停止:   docker-compose down
#   日志:   docker-compose logs -f devpartner
#   重启:   docker-compose restart devpartner
#   重建:   docker-compose up -d --build

version: "3.8"

services:
  devpartner:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: devpartner:v6.0-modelscope
    container_name: devpartner-modelspace
    restart: unless-stopped

    # ModelScope 创空间标准端口
    ports:
      - "7860:7860"

    # 持久化目录挂载（ModelScope 云端专用）
    volumes:
      # 运行时数据（对话记录、日志、知识库等）
      - ./data:/app/data
      # ★ 模型文件目录（必须挂载 Dataset 或包含模型！）
      - ./models:/app/models

    environment:
      - MCP_PORT=7860
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # v6.0: 模型路径配置
      - MODEL_PATH=/app/models/Qwen3.5-9B-Q4_1.gguf
      # v6.0: Streamable HTTP 模式标识
      - TRANSPORT_MODE=streamable-http

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "
import urllib.request
try:
    urllib.request.urlopen('http://localhost:7860/dashboard', timeout=5)
    exit(0)
except:
    exit(1)
"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # 资源限制（根据实际需求调整）
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G