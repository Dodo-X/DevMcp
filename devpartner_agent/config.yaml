# DevPartner Agent v5.2.0 配置
# 智能管家层，有状态管理，配置项较多
# 引擎：llama-cpp-python + Qwen3.5-9B-Q4_1

agent:
  name: "devpartner-agent"
  version: "5.2.0"
  description: "DevPartner 智能管家 - 会话管理 + 异步任务 + 知识图谱 + Web Dashboard"

server:
  host: "0.0.0.0"
  port: 8082
  transport: "stdio"

data:
  root_dir: "./data"
  databases_dir: "./data/databases"
  daily_logs_dir: "./data/daily_logs"
  logs_dir: "./data/logs"
  logs_archive_dir: "./data/logs_archive"
  memories_dir: "./data/memories"
  backups_dir: "./data/backups"
  reports_dir: "./data/reports"
  temp_dir: "./data/temp"

services:
  log_service:
    enabled: true
    log_retention_days: 90
    auto_cleanup: true
  dialogue_service:
    enabled: true
    max_message_history: 500
  evolution_service:
    enabled: true
    max_changes_per_day: 3
    require_approval: true
    backup_before_change: true
  data_lifecycle:
    log_retention_days: 90
    db_cleanup_days: 90
    auto_cleanup: true
    backup_before_cleanup: true

rules:
  auto_load_builtin: true
  trigger_on_startup: true

logging:
  level: DEBUG
  format: "[%(asctime)s] [%(levelname)s] %(name)s: %(message)s"
  file: "./data/logs/agent.log"

# 本地 LLM 配置（v5.1 - llama-cpp-python 专用）
# ==========================================
# 使用 llama-cpp-python 直接加载本地 GGUF 模型文件
# 当前模型：Qwen3.5-9B Q4_1 量化版（4-bit 量化，平衡性能与质量）
#
# 模型信息：
# - 路径：D:\WorkSpace\AI_model\Qwen3.5-9B-Q4_1.gguf
# - 参数量：9B (90亿参数)
# - 量化级别：Q4_1 (4-bit, 约 5.7GB)
# - 推理速度：CPU ~15-25 tokens/s, GPU 加速更快
#
# 安装依赖：
# pip install llama-cpp-python>=0.2.79
# （如需 CUDA 加速：pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cu121）
llm:
  enabled: true                              # 是否启用 LLM 增强
  
  # ── 模型路径配置 ──
  model_path: "D:/WorkSpace/AI_model/Qwen3.5-9B-Q4_1.gguf"  # GGUF 模型文件绝对路径
  
  # ── 推理参数（针对 Q4_1 量化模型优化）──
  n_ctx: 8192                                # 上下文窗口大小（Qwen3.5-9B 支持 32K，设 8K 平衡内存）
  n_gpu_layers: -1                           # GPU 加速层数（-1=全部使用GPU，0=纯CPU）
  n_threads: 8                               # CPU 线程数（建议设为核心数，如 8 核则填 8）
  n_batch: 512                               # 批处理大小（影响推理速度，512 适合 Q4_1）
  
  # ── 生成参数 ──
  max_tokens: 2048                           # 最大生成 token 数（Q4_1 可适当增大）
  max_input_chars: 8000                      # 最大输入字符数（增大以利用长上下文）
  temperature: 0.3                           # 生成温度（Q4_1 建议稍高以保持多样性）
  top_p: 0.9                                 # Top-P 采样（核采样，控制随机性）
  top_k: 40                                  # Top-K 采样（限制候选词数量）
  repeat_penalty: 1.1                        # 重复惩罚（避免循环输出）
  
  # ── 性能优化 ──
  verbose: false                             # 详细日志（调试时开启）
  preload: true                              # 启动时预加载模型到内存
  cache_size_kb: 2048                        # 模型缓存大小（KB，增大可加速重复调用）
  use_mmap: true                             # 使用内存映射文件（减少内存占用）
  use_mlock: false                           # 锁定内存（防止交换到磁盘）
  
  # ── 容错机制 ──
  retry_on_error: true                       # 推理失败时自动重试
  fallback_to_rules: true                    # 模型加载失败时降级到规则引擎
  
  # ── 功能开关 ──
  enhance_analysis: true                     # 对话分析增强（LLM 语义理解）⭐ 推荐
  enhance_file_parsing: true                 # 文件解析增强（LLM 智能拆分）
  enhance_daily_summary: true                # LLM 智能日报生成 ⭐ 强烈推荐
  enhance_self_improvement: true             # LLM 自我改进建议 ⭐ 推荐