# DevPartner Agent v7.5 配置
# 智能管家层，有状态管理，配置项较多
# 引擎：Ollama（本地 HTTP API）
# 传输：Streamable HTTP

agent:
  name: "devpartner-agent"
  version: "7.5.0"
  description: "DevPartner 智能管家 - 会话管理 + 异步任务 + 知识图谱 + Web Dashboard"

server:
  host: "0.0.0.0"
  port: 7860
  transport: "streamable-http"

data:
  root_dir: "./data"
  databases_dir: "./data/databases"
  daily_logs_dir: "./data/daily_logs"
  logs_dir: "./data/logs"
  logs_archive_dir: "./data/logs_archive"
  memories_dir: "./data/memories"
  backups_dir: "./data/backups"
  reports_dir: "./data/reports"
  temp_dir: "./data/temp"

services:
  log_service:
    enabled: true
    log_retention_days: 90
    auto_cleanup: true
  dialogue_service:
    enabled: true
    max_message_history: 500
  evolution_service:
    enabled: true
  data_lifecycle:
    log_retention_days: 90
    db_cleanup_days: 90
    auto_cleanup: true
    backup_before_cleanup: true

rules:
  auto_load_builtin: true
  trigger_on_startup: true

logging:
  level: DEBUG
  format: "[%(asctime)s] [%(levelname)s] %(name)s: %(message)s"
  file: "./data/logs/agent.log"

# 本地 LLM 配置（v7.3.0 — Ollama 引擎）
# ==========================================
# 使用本地 Ollama 服务（http://localhost:11434）进行推理。
# 前提：已安装 Ollama 并拉取所需模型。
#
# 安装 Ollama：https://ollama.com/download
# 拉取模型：ollama pull qwen3
llm:
  enabled: true                              # 是否启用 LLM 增强
  
  # ── Ollama 连接 ──
  ollama_model: "qwen3"                      # Ollama 模型名称（ollama list 查看可用模型）
  ollama_timeout: 120                        # 推理超时（秒）
  
  # ── 生成参数 ──
  max_tokens: 2048                           # 最大生成 token 数
  max_input_chars: 8000                      # 最大输入字符数
  temperature: 0.3                           # 生成温度
  top_p: 0.9                                 # Top-P 采样（核采样）
  top_k: 40                                  # Top-K 采样
  repeat_penalty: 1.1                        # 重复惩罚
  
  # ── 启动行为 ──
  preload: true                              # 启动时验证 Ollama 连接并测试推理
  
  # ── 容错机制 ──
  fallback_to_rules: true                    # 模型不可用时降级到规则引擎
  
  # ── 功能开关 ──
  enhance_analysis: true                     # 对话分析增强（LLM 语义理解）⭐ 推荐
  enhance_file_parsing: true                 # 文件解析增强（LLM 智能拆分）
  enhance_daily_summary: true                # LLM 智能日报生成 ⭐ 强烈推荐
  enhance_self_improvement: true             # LLM 自我改进建议 ⭐ 推荐