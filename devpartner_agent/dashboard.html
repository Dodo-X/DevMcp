<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevPartner 运维仪表盘 v{{VERSION}}</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4eb;
    --text-muted: #8b8fa3;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:1280px; margin:0 auto; padding:24px; }
  header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid var(--border); margin-bottom:24px; }
  header h1 { font-size:22px; font-weight:600; }
  header .version { font-size:13px; color:var(--text-muted); background:var(--card-bg); padding:4px 10px; border-radius:6px; }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .status-dot.online { background:var(--green); box-shadow:0 0 6px var(--green); }
  .status-dot.offline { background:var(--red); }
  .status-dot.warning { background:var(--yellow); }

  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
  .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:24px; }

  .card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .card-header h2 { font-size:14px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
  .card-header .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--accent); color:#fff; }

  .metric-value { font-size:36px; font-weight:700; line-height:1; }
  .metric-label { font-size:12px; color:var(--text-muted); margin-top:6px; }
  .metric-change { font-size:12px; margin-top:4px; }
  .metric-change.up { color:var(--green); }
  .metric-change.down { color:var(--red); }

  .progress-bar { height:6px; background:var(--border); border-radius:3px; margin-top:8px; overflow:hidden; }
  .progress-bar .fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
  .progress-bar .fill.green { background:var(--green); }
  .progress-bar .fill.yellow { background:var(--yellow); }
  .progress-bar .fill.red { background:var(--red); }
  .progress-bar .fill.accent { background:var(--accent); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 8px; border-bottom:1px solid var(--border); color:var(--text-muted); font-weight:500; font-size:11px; text-transform:uppercase; }
  td { padding:10px 8px; border-bottom:1px solid var(--border); }
  tr:hover td { background:rgba(99,102,241,0.05); }

  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
  .tag.pending { background:rgba(234,179,8,0.15); color:var(--yellow); }
  .tag.running { background:rgba(99,102,241,0.15); color:var(--accent); }
  .tag.completed { background:rgba(34,197,94,0.15); color:var(--green); }
  .tag.failed { background:rgba(239,68,68,0.15); color:var(--red); }

  .refresh-bar { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text-muted); margin-bottom:16px; }
  .refresh-bar button { background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
  .refresh-bar button:hover { border-color:var(--accent); }

  .memory-bar { margin-bottom:12px; }
  .memory-bar .label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:4px; }

  .empty { text-align:center; padding:32px; color:var(--text-muted); font-size:13px; }

  .error-banner { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; color:var(--red); font-size:13px; display:none; }

  @media (max-width:768px) {
    .grid-4 { grid-template-columns:repeat(2,1fr); }
    .grid-3, .grid-2 { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1><span class="status-dot online" id="sysStatusDot"></span>DevPartner 运维仪表盘</h1>
    </div>
    <span class="version">v{{VERSION}}</span>
  </header>

  <div class="error-banner" id="errorBanner"></div>

  <div id="pendingAnalysesAlert" style="display:none;background:rgba(234,179,8,0.1);border:1px solid var(--yellow);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;color:var(--text);font-size:14px;"></div>

  <div class="refresh-bar">
    <span id="lastUpdate">加载中...</span>
    <button onclick="refreshAll()">⟳ 刷新</button>
  </div>

  <!-- 核心指标 -->
  <div class="grid-4">
    <div class="card">
      <div class="metric-value" id="activeSessions">-</div>
      <div class="metric-label">活跃会话 (24h)</div>
    </div>
    <div class="card">
      <div class="metric-value" id="todaySessions">-</div>
      <div class="metric-label">今日新会话</div>
    </div>
    <div class="card">
      <div class="metric-value" id="kbSize">-</div>
      <div class="metric-label">知识库条目</div>
    </div>
    <div class="card">
      <div class="metric-value" id="todayKnowledge">-</div>
      <div class="metric-label">今日新增知识</div>
    </div>
  </div>

  <!-- 任务队列 + 内存 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h2>任务队列</h2><span class="badge" id="taskTotal">-</span></div>
      <div class="grid-3" style="margin-bottom:12px;">
        <div><div class="metric-value" style="font-size:24px;" id="pendingTasks">-</div><div class="metric-label">待处理</div></div>
        <div><div class="metric-value" style="font-size:24px;" id="runningTasks">-</div><div class="metric-label">运行中</div></div>
        <div><div class="metric-value" style="font-size:24px;" id="completedTasks">-</div><div class="metric-label">已完成</div></div>
      </div>
      <table id="taskTable">
        <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>状态</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header"><h2>内存使用</h2></div>
      <div class="memory-bar">
        <div class="label"><span id="memUsedLabel">进程 RSS</span><span id="memRSS">-</span></div>
        <div class="progress-bar"><div class="fill accent" id="memRSSBar" style="width:0%"></div></div>
      </div>
      <div class="memory-bar">
        <div class="label"><span>系统总内存</span><span id="memSys">-</span></div>
        <div class="progress-bar"><div class="fill yellow" id="memSysBar" style="width:0%"></div></div>
      </div>
      <div id="memDetails"></div>
    </div>
  </div>

  <!-- 任务运维监管 (v8.1) -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h2>任务运维指标</h2><span class="badge" id="taskSuccessRate">-</span></div>
      <div class="grid-4" style="margin-bottom:12px;">
        <div><div class="metric-value" style="font-size:20px;color:var(--green);" id="opsCompleted">-</div><div class="metric-label">成功</div></div>
        <div><div class="metric-value" style="font-size:20px;color:var(--red);" id="opsFailed">-</div><div class="metric-label">失败</div></div>
        <div><div class="metric-value" style="font-size:20px;color:var(--yellow);" id="opsTimeout">-</div><div class="metric-label">超时</div></div>
        <div><div class="metric-value" style="font-size:20px;color:var(--text-muted);" id="opsCancelled">-</div><div class="metric-label">取消</div></div>
      </div>
      <div class="memory-bar">
        <div class="label"><span>平均耗时</span><span id="opsAvgTime">-</span></div>
      </div>
      <div class="memory-bar">
        <div class="label"><span>并发槽位 (可用/总)</span><span id="opsSlots">-</span></div>
        <div class="progress-bar"><div class="fill accent" id="opsSlotsBar" style="width:0%"></div></div>
      </div>
      <div class="memory-bar">
        <div class="label"><span>队列内存</span><span id="opsMem">-</span></div>
        <div class="progress-bar"><div class="fill yellow" id="opsMemBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>并发诊断</h2><span class="badge" id="diagMode">v8.1</span></div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">阶段锁 & 运行中任务</div>
      <div id="diagContent" class="empty">加载中...</div>
    </div>
  </div>

  <!-- Handler 注册清单 (v8.1) -->
  <div class="card" style="margin-bottom:24px;">
    <div class="card-header"><h2>已注册任务处理器</h2><span class="badge" id="handlerTotal">-</span></div>
    <div id="handlerContent" class="empty">加载中...</div>
  </div>

  <!-- 回调统计 + 健康检查 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h2>回调统计</h2></div>
      <div class="grid-2" style="margin-bottom:12px;">
        <div><div class="metric-value" style="font-size:24px; color:var(--green);" id="cbSuccess">-</div><div class="metric-label">成功触发</div></div>
        <div><div class="metric-value" style="font-size:24px; color:var(--red);" id="cbError">-</div><div class="metric-label">错误次数</div></div>
      </div>
      <table id="cbTable">
        <thead><tr><th>ID</th><th>名称</th><th>状态</th><th>时间</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header"><h2>服务健康</h2></div>
      <div id="healthContent" class="empty">加载中...</div>
    </div>
  </div>

</div>

<script>
const API_BASE = '';

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleString('zh-CN', { hour12: false });
}

function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

function statusTag(s) {
  const cls = {pending:'pending',running:'running',completed:'completed',failed:'failed'}[s] || 'pending';
  return `<span class="tag ${cls}">${s}</span>`;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}

async function refreshSystemStatus() {
  try {
    const d = await fetchJSON('/api/system/status');
    document.getElementById('activeSessions').textContent = d.active_sessions ?? '-';
    document.getElementById('todaySessions').textContent = d.today_new_sessions ?? '-';
    document.getElementById('kbSize').textContent = d.knowledge_base_size ?? '-';
    document.getElementById('todayKnowledge').textContent = d.today_knowledge_added ?? '-';
    document.getElementById('pendingTasks').textContent = d.pending_tasks ?? '-';
    document.getElementById('runningTasks').textContent = d.running_tasks ?? '-';
    document.getElementById('completedTasks').textContent = d.completed_tasks ?? '-';
    document.getElementById('taskTotal').textContent = (d.pending_tasks||0)+(d.running_tasks||0)+(d.completed_tasks||0);
    document.getElementById('cbSuccess').textContent = d.callback_triggers ?? '-';
    document.getElementById('cbError').textContent = 0;
    document.getElementById('errorBanner').style.display = 'none';

    const paCount = d.pending_analyses_count ?? 0;
    const paEl = document.getElementById('pendingAnalysesAlert');
    if (paEl) {
      if (paCount > 0) {
        paEl.style.display = 'block';
        paEl.innerHTML = '<span class="status-dot warning"></span>' +
          '<strong>待分析数据: ' + paCount + ' 条</strong> — LLM 不可用时数据暂存，等待下次清算' +
          '<button onclick="processPendingAnalyses()" style="margin-left:12px;padding:4px 12px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-size:12px;">手动清算</button>' +
          '<div id="pendingAnalysesDetails" style="margin-top:8px;font-size:12px;color:var(--text-muted);max-height:120px;overflow-y:auto;"></div>';
        const details = d.pending_analyses_details ?? [];
        const detailsEl = document.getElementById('pendingAnalysesDetails');
        if (detailsEl && details.length) {
          detailsEl.innerHTML = details.map(pa => {
            const typeLabel = pa.type === 'daily_profile_merge' ? '用户画像' : '系统认知';
            const dims = pa.missing_dimensions || '[]';
            return '<div>' + typeLabel + ' | ' + pa.date + ' | 缺失: ' + dims + '</div>';
          }).join('');
        }
      } else {
        paEl.style.display = 'none';
      }
    }
  } catch(e) {
    document.getElementById('errorBanner').style.display = 'block';
    document.getElementById('errorBanner').textContent = '系统状态获取失败: ' + e.message;
  }
}

async function processPendingAnalyses() {
  try {
    const res = await fetch('/api/pending-analyses/process', { method: 'POST' });
    const data = await res.json();
    if (data.processed > 0) {
      alert('清算完成: ' + data.processed + ' 条已处理');
    } else if (data.still_pending > 0) {
      alert('LLM 仍不可用，' + data.still_pending + ' 条待处理');
    } else {
      alert('无待分析数据');
    }
    refreshSystemStatus();
  } catch(e) {
    alert('清算失败: ' + e.message);
  }
}

async function refreshTasks() {
  try {
    const tasks = await fetchJSON('/api/tasks/list?limit=20');
    const tbody = document.querySelector('#taskTable tbody');
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无任务</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => {
      const canCancel = (t.status === 'pending' || t.status === 'queued');
      const cancelBtn = canCancel
        ? `<button onclick="cancelTask('${t.id}')" style="padding:2px 8px;border-radius:4px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;font-size:11px;">取消</button>`
        : '<span style="color:var(--text-muted);font-size:11px;">-</span>';
      return `
      <tr>
        <td style="font-family:monospace;font-size:12px;">${t.id}</td>
        <td>${t.name}</td>
        <td style="font-size:12px;color:var(--text-muted);">${t.type}</td>
        <td>${statusTag(t.status)}</td>
        <td>${cancelBtn}</td>
      </tr>`;
    }).join('');
  } catch(e) { /* 静默 */ }
}

async function cancelTask(taskId) {
  if (!confirm('确认取消任务 ' + taskId + ' ?')) return;
  try {
    const res = await fetch('/api/tasks/cancel', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task_id: taskId})
    });
    const data = await res.json();
    if (data.success) {
      alert('任务已取消: ' + taskId);
    } else {
      alert('取消失败（任务可能已在运行）: ' + taskId);
    }
    refreshTasks();
    refreshTaskOps();
  } catch(e) {
    alert('取消失败: ' + e.message);
  }
}

async function refreshTaskOps() {
  try {
    const d = await fetchJSON('/api/tasks/stats');
    document.getElementById('opsCompleted').textContent = d.completed ?? '-';
    document.getElementById('opsFailed').textContent = d.failed ?? '-';
    document.getElementById('opsTimeout').textContent = d.timeout ?? '-';
    document.getElementById('opsCancelled').textContent = d.cancelled ?? '-';
    document.getElementById('taskSuccessRate').textContent = (d.success_rate ?? 0) + '%';
    document.getElementById('opsAvgTime').textContent = (d.avg_execution_time ?? 0) + ' 秒';

    const slotsTotal = d.active_workers ?? 0;
    const slotsAvail = d.available_slots ?? 0;
    const slotsUsed = slotsTotal - slotsAvail;
    document.getElementById('opsSlots').textContent = slotsAvail + ' / ' + slotsTotal + ' (使用 ' + slotsUsed + ')';
    const slotsPct = slotsTotal > 0 ? Math.round((slotsUsed / slotsTotal) * 100) : 0;
    document.getElementById('opsSlotsBar').style.width = slotsPct + '%';

    const memUsed = d.memory_usage_mb ?? 0;
    const memLimit = d.memory_limit_mb ?? 1;
    document.getElementById('opsMem').textContent = memUsed + ' MB / ' + memLimit + ' MB';
    document.getElementById('opsMemBar').style.width = Math.min(d.utilization_percent ?? 0, 100) + '%';
  } catch(e) { /* 静默 */ }
}

async function refreshDiagnostics() {
  try {
    const d = await fetchJSON('/api/tasks/diagnostics');
    let html = '';

    const running = d.running_tasks || [];
    if (running.length > 0) {
      html += '<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">运行中 (' + running.length + ')</div>';
      html += '<table><thead><tr><th>ID</th><th>类型</th><th>会话</th><th>开始时间</th></tr></thead><tbody>';
      running.forEach(t => {
        html += `<tr>
          <td style="font-family:monospace;font-size:11px;">${(t.id||'').slice(0,8)}</td>
          <td style="font-size:11px;">${t.type||'-'}</td>
          <td style="font-family:monospace;font-size:11px;">${(t.conv||'global').slice(0,12)}</td>
          <td style="font-size:11px;color:var(--text-muted);">${fmtTime(t.started)}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
    }

    const pending = d.pending_preview || [];
    if (pending.length > 0) {
      html += '<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">排队中 (' + d.pending_in_queue + ')</div>';
      html += '<table><thead><tr><th>ID</th><th>类型</th><th>会话</th></tr></thead><tbody>';
      pending.forEach(t => {
        html += `<tr>
          <td style="font-family:monospace;font-size:11px;">${(t.id||'').slice(0,8)}</td>
          <td style="font-size:11px;">${t.type||'-'}</td>
          <td style="font-family:monospace;font-size:11px;">${(t.conv||'global').slice(0,12)}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
    }

    const stepCounters = d.conv_step_counters || {};
    const counterKeys = Object.keys(stepCounters);
    if (counterKeys.length > 0) {
      html += '<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">会话步骤计数器</div>';
      counterKeys.forEach(k => {
        html += `<div style="font-size:11px;font-family:monospace;">${k.slice(0,16)}: ${stepCounters[k]} 个 step_analysis 在执行</div>`;
      });
      html += '</div>';
    }

    const statusBreakdown = d.status_breakdown || {};
    const statusKeys = Object.keys(statusBreakdown);
    if (statusKeys.length > 0) {
      html += '<div><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">状态分布</div>';
      statusKeys.forEach(k => {
        html += `<div style="font-size:11px;display:flex;justify-content:space-between;"><span>${k}</span><span>${statusBreakdown[k]}</span></div>`;
      });
      html += '</div>';
    }

    if (!html) {
      html = '<div class="empty">队列空闲，无运行中任务</div>';
    }

    document.getElementById('diagContent').innerHTML = html;
  } catch(e) {
    document.getElementById('diagContent').innerHTML = '<div class="empty" style="color:var(--red);">诊断信息获取失败</div>';
  }
}

async function refreshHandlers() {
  try {
    const d = await fetchJSON('/api/tasks/handlers');
    document.getElementById('handlerTotal').textContent = d.total ?? '-';
    const handlers = d.handlers || [];
    if (!handlers.length) {
      document.getElementById('handlerContent').innerHTML = '<div class="empty">无已注册处理器</div>';
      return;
    }
    const parallel = handlers.filter(h => h.phase === 'PARALLEL');
    const sequential = handlers.filter(h => h.phase === 'SEQUENTIAL');
    let html = '';
    if (parallel.length) {
      html += '<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--green);margin-bottom:6px;">PARALLEL (可并行, ' + parallel.length + ' 个)</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
      parallel.forEach(h => {
        html += `<span class="tag" style="background:rgba(34,197,94,0.15);color:var(--green);">${h.name}</span>`;
      });
      html += '</div></div>';
    }
    if (sequential.length) {
      html += '<div><div style="font-size:12px;color:var(--yellow);margin-bottom:6px;">SEQUENTIAL (串行, ' + sequential.length + ' 个)</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
      sequential.forEach(h => {
        html += `<span class="tag" style="background:rgba(234,179,8,0.15);color:var(--yellow);">${h.name}</span>`;
      });
      html += '</div></div>';
    }
    document.getElementById('handlerContent').innerHTML = html;
  } catch(e) {
    document.getElementById('handlerContent').innerHTML = '<div class="empty" style="color:var(--red);">处理器清单获取失败</div>';
  }
}

async function refreshMemory() {
  try {
    const d = await fetchJSON('/api/system/memory');
    document.getElementById('memRSS').textContent = d.used_mb + ' MB / ' + d.total_mb + ' MB';
    const pct = Math.min(d.percent, 100);
    document.getElementById('memRSSBar').style.width = pct + '%';
    document.getElementById('memSys').textContent = (d.details?.[2]?.size_mb || 0) + ' MB';
    document.getElementById('memSysBar').style.width = (d.details?.[2]?.percent || 0) + '%';

    const detDiv = document.getElementById('memDetails');
    detDiv.innerHTML = (d.details || []).map(i =>
      `<div class="memory-bar" style="margin-top:8px;">
        <div class="label"><span>${i.name}</span><span>${i.size_mb} MB (${i.percent}%)</span></div>
      </div>`
    ).join('');
  } catch(e) { /* 静默 */ }
}

async function refreshCallbacks() {
  try {
    const d = await fetchJSON('/api/callbacks/stats');
    const tbody = document.querySelector('#cbTable tbody');
    const recent = d.recent_calls || [];
    if (!recent.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无回调记录</td></tr>';
      return;
    }
    tbody.innerHTML = recent.map(c => `
      <tr>
        <td style="font-family:monospace;font-size:12px;">${c.id}</td>
        <td>${c.name}</td>
        <td>${statusTag(c.status)}</td>
        <td style="font-size:12px;color:var(--text-muted);">${fmtTime(c.timestamp)}</td>
      </tr>
    `).join('');
  } catch(e) { /* 静默 */ }
}

async function refreshHealth() {
  try {
    const d = await fetchJSON('/api/health/check');
    const svc = d.services || {};
    const items = Object.entries(svc).map(([k,v]) => {
      const dot = v.healthy ? '<span class="status-dot online"></span>' : '<span class="status-dot offline"></span>';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
        <span>${dot} ${k}</span>
        <span style="font-size:12px;color:var(--text-muted);">${v.detail || ''}</span>
      </div>`;
    }).join('');
    document.getElementById('healthContent').innerHTML = items || '<div class="empty">无服务信息</div>';
  } catch(e) {
    document.getElementById('healthContent').innerHTML = '<div class="empty" style="color:var(--red);">健康检查失败</div>';
  }
}

async function refreshAll() {
  document.getElementById('lastUpdate').textContent = '刷新中...';
  await Promise.all([
    refreshSystemStatus(),
    refreshTasks(),
    refreshTaskOps(),
    refreshDiagnostics(),
    refreshHandlers(),
    refreshMemory(),
    refreshCallbacks(),
    refreshHealth(),
  ]);
  document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
