<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevPartner 运维仪表盘 v{{VERSION}}</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4eb;
    --text-muted: #8b8fa3;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:1280px; margin:0 auto; padding:24px; }
  header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid var(--border); margin-bottom:24px; }
  header h1 { font-size:22px; font-weight:600; }
  header .version { font-size:13px; color:var(--text-muted); background:var(--card-bg); padding:4px 10px; border-radius:6px; }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .status-dot.online { background:var(--green); box-shadow:0 0 6px var(--green); }
  .status-dot.offline { background:var(--red); }
  .status-dot.warning { background:var(--yellow); }

  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
  .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:24px; }

  .card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .card-header h2 { font-size:14px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
  .card-header .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--accent); color:#fff; }

  .metric-value { font-size:36px; font-weight:700; line-height:1; }
  .metric-label { font-size:12px; color:var(--text-muted); margin-top:6px; }
  .metric-change { font-size:12px; margin-top:4px; }
  .metric-change.up { color:var(--green); }
  .metric-change.down { color:var(--red); }

  .progress-bar { height:6px; background:var(--border); border-radius:3px; margin-top:8px; overflow:hidden; }
  .progress-bar .fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
  .progress-bar .fill.green { background:var(--green); }
  .progress-bar .fill.yellow { background:var(--yellow); }
  .progress-bar .fill.red { background:var(--red); }
  .progress-bar .fill.accent { background:var(--accent); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 8px; border-bottom:1px solid var(--border); color:var(--text-muted); font-weight:500; font-size:11px; text-transform:uppercase; }
  td { padding:10px 8px; border-bottom:1px solid var(--border); }
  tr:hover td { background:rgba(99,102,241,0.05); }

  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
  .tag.pending { background:rgba(234,179,8,0.15); color:var(--yellow); }
  .tag.running { background:rgba(99,102,241,0.15); color:var(--accent); }
  .tag.completed { background:rgba(34,197,94,0.15); color:var(--green); }
  .tag.failed { background:rgba(239,68,68,0.15); color:var(--red); }

  .refresh-bar { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text-muted); margin-bottom:16px; }
  .refresh-bar button { background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
  .refresh-bar button:hover { border-color:var(--accent); }

  .memory-bar { margin-bottom:12px; }
  .memory-bar .label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:4px; }

  .empty { text-align:center; padding:32px; color:var(--text-muted); font-size:13px; }

  .error-banner { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; color:var(--red); font-size:13px; display:none; }

  @media (max-width:768px) {
    .grid-4 { grid-template-columns:repeat(2,1fr); }
    .grid-3, .grid-2 { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1><span class="status-dot online" id="sysStatusDot"></span>DevPartner 运维仪表盘</h1>
    </div>
    <span class="version">v{{VERSION}}</span>
  </header>

  <div class="error-banner" id="errorBanner"></div>

  <div class="refresh-bar">
    <span id="lastUpdate">加载中...</span>
    <button onclick="refreshAll()">⟳ 刷新</button>
  </div>

  <!-- 核心指标 -->
  <div class="grid-4">
    <div class="card">
      <div class="metric-value" id="activeSessions">-</div>
      <div class="metric-label">活跃会话 (24h)</div>
    </div>
    <div class="card">
      <div class="metric-value" id="todaySessions">-</div>
      <div class="metric-label">今日新会话</div>
    </div>
    <div class="card">
      <div class="metric-value" id="kbSize">-</div>
      <div class="metric-label">知识库条目</div>
    </div>
    <div class="card">
      <div class="metric-value" id="todayKnowledge">-</div>
      <div class="metric-label">今日新增知识</div>
    </div>
  </div>

  <!-- 任务队列 + 内存 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h2>任务队列</h2><span class="badge" id="taskTotal">-</span></div>
      <div class="grid-3" style="margin-bottom:12px;">
        <div><div class="metric-value" style="font-size:24px;" id="pendingTasks">-</div><div class="metric-label">待处理</div></div>
        <div><div class="metric-value" style="font-size:24px;" id="runningTasks">-</div><div class="metric-label">运行中</div></div>
        <div><div class="metric-value" style="font-size:24px;" id="completedTasks">-</div><div class="metric-label">已完成</div></div>
      </div>
      <table id="taskTable">
        <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>状态</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header"><h2>内存使用</h2></div>
      <div class="memory-bar">
        <div class="label"><span id="memUsedLabel">进程 RSS</span><span id="memRSS">-</span></div>
        <div class="progress-bar"><div class="fill accent" id="memRSSBar" style="width:0%"></div></div>
      </div>
      <div class="memory-bar">
        <div class="label"><span>系统总内存</span><span id="memSys">-</span></div>
        <div class="progress-bar"><div class="fill yellow" id="memSysBar" style="width:0%"></div></div>
      </div>
      <div id="memDetails"></div>
    </div>
  </div>

  <!-- 回调统计 + 健康检查 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h2>回调统计</h2></div>
      <div class="grid-2" style="margin-bottom:12px;">
        <div><div class="metric-value" style="font-size:24px; color:var(--green);" id="cbSuccess">-</div><div class="metric-label">成功触发</div></div>
        <div><div class="metric-value" style="font-size:24px; color:var(--red);" id="cbError">-</div><div class="metric-label">错误次数</div></div>
      </div>
      <table id="cbTable">
        <thead><tr><th>ID</th><th>名称</th><th>状态</th><th>时间</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header"><h2>服务健康</h2></div>
      <div id="healthContent" class="empty">加载中...</div>
    </div>
  </div>

</div>

<script>
const API_BASE = '';

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleString('zh-CN', { hour12: false });
}

function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

function statusTag(s) {
  const cls = {pending:'pending',running:'running',completed:'completed',failed:'failed'}[s] || 'pending';
  return `<span class="tag ${cls}">${s}</span>`;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}

async function refreshSystemStatus() {
  try {
    const d = await fetchJSON('/api/system/status');
    document.getElementById('activeSessions').textContent = d.active_sessions ?? '-';
    document.getElementById('todaySessions').textContent = d.today_new_sessions ?? '-';
    document.getElementById('kbSize').textContent = d.knowledge_base_size ?? '-';
    document.getElementById('todayKnowledge').textContent = d.today_knowledge_added ?? '-';
    document.getElementById('pendingTasks').textContent = d.pending_tasks ?? '-';
    document.getElementById('runningTasks').textContent = d.running_tasks ?? '-';
    document.getElementById('completedTasks').textContent = d.completed_tasks ?? '-';
    document.getElementById('taskTotal').textContent = (d.pending_tasks||0)+(d.running_tasks||0)+(d.completed_tasks||0);
    document.getElementById('cbSuccess').textContent = d.callback_triggers ?? '-';
    document.getElementById('cbError').textContent = 0;
    document.getElementById('errorBanner').style.display = 'none';
  } catch(e) {
    document.getElementById('errorBanner').style.display = 'block';
    document.getElementById('errorBanner').textContent = '系统状态获取失败: ' + e.message;
  }
}

async function refreshTasks() {
  try {
    const tasks = await fetchJSON('/api/tasks/list?limit=20');
    const tbody = document.querySelector('#taskTable tbody');
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无任务</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td style="font-family:monospace;font-size:12px;">${t.id}</td>
        <td>${t.name}</td>
        <td style="font-size:12px;color:var(--text-muted);">${t.type}</td>
        <td>${statusTag(t.status)}</td>
      </tr>
    `).join('');
  } catch(e) { /* 静默 */ }
}

async function refreshMemory() {
  try {
    const d = await fetchJSON('/api/system/memory');
    document.getElementById('memRSS').textContent = d.used_mb + ' MB / ' + d.total_mb + ' MB';
    const pct = Math.min(d.percent, 100);
    document.getElementById('memRSSBar').style.width = pct + '%';
    document.getElementById('memSys').textContent = (d.details?.[2]?.size_mb || 0) + ' MB';
    document.getElementById('memSysBar').style.width = (d.details?.[2]?.percent || 0) + '%';

    const detDiv = document.getElementById('memDetails');
    detDiv.innerHTML = (d.details || []).map(i =>
      `<div class="memory-bar" style="margin-top:8px;">
        <div class="label"><span>${i.name}</span><span>${i.size_mb} MB (${i.percent}%)</span></div>
      </div>`
    ).join('');
  } catch(e) { /* 静默 */ }
}

async function refreshCallbacks() {
  try {
    const d = await fetchJSON('/api/callbacks/stats');
    const tbody = document.querySelector('#cbTable tbody');
    const recent = d.recent_calls || [];
    if (!recent.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无回调记录</td></tr>';
      return;
    }
    tbody.innerHTML = recent.map(c => `
      <tr>
        <td style="font-family:monospace;font-size:12px;">${c.id}</td>
        <td>${c.name}</td>
        <td>${statusTag(c.status)}</td>
        <td style="font-size:12px;color:var(--text-muted);">${fmtTime(c.timestamp)}</td>
      </tr>
    `).join('');
  } catch(e) { /* 静默 */ }
}

async function refreshHealth() {
  try {
    const d = await fetchJSON('/api/health/check');
    const svc = d.services || {};
    const items = Object.entries(svc).map(([k,v]) => {
      const dot = v.healthy ? '<span class="status-dot online"></span>' : '<span class="status-dot offline"></span>';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
        <span>${dot} ${k}</span>
        <span style="font-size:12px;color:var(--text-muted);">${v.detail || ''}</span>
      </div>`;
    }).join('');
    document.getElementById('healthContent').innerHTML = items || '<div class="empty">无服务信息</div>';
  } catch(e) {
    document.getElementById('healthContent').innerHTML = '<div class="empty" style="color:var(--red);">健康检查失败</div>';
  }
}

async function refreshAll() {
  document.getElementById('lastUpdate').textContent = '刷新中...';
  await Promise.all([
    refreshSystemStatus(),
    refreshTasks(),
    refreshMemory(),
    refreshCallbacks(),
    refreshHealth(),
  ]);
  document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
