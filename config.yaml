# devPartner 配置文件
# 可用环境变量覆盖: DEVPARTNER_PORT, OLLAMA_HOST, DEVPARTNER_SHARED_DB

app:
  name: devPartner
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8080
  transport: sse
  project_root: "."

ollama:
  host: "http://localhost:11434"
  model: "qwen2.5-coder:7b"
  timeout: 600

database:
  local_db: "data/devpartner.db"
  shared_db: "D:/trae-archive/toptown_tracker/work_tracker.db"
  agent_name: devpartner
  report_dir: "D:/trae-archive/toptown_tracker/devpartner-reports"

log:
  daily_logs_dir: "data/daily_logs"
  log_archive_dir: "data/logs_archive"
  tool_archive_dir: "data/tool_archive"
  log_retention_days: 30

dialogue:
  dialogue_file: "D:/trae-archive/toptown_tracker/agent_dialogue.md"
  state_file: "data/.dialogue_state.json"
  pending_file: "data/.pending_dialogue.json"

evolution:
  enabled: true
  auto_discover_interval_hours: 24
  backup_before_upgrade: true
  max_auto_upgrades_per_day: 3
  known_mcp_servers:
    - "@modelcontextprotocol/server-filesystem"
    - "@modelcontextprotocol/server-github"
    - "@modelcontextprotocol/server-sequential-thinking"
    - "@modelcontextprotocol/server-fetch"
    - "@modelcontextprotocol/server-sqlite"
    - "@modelcontextprotocol/server-git"
    - "@modelcontextprotocol/server-memory"
    - "@upstash/context7-mcp"
    - "@anthropic/mcp-server-brave-search"
    - "@browserbasehq/mcp-server-browserbase"
    - "@anthropic/mcp-server-puppeteer"
    - "@anthropic/mcp-server-playwright"
    - "@modelcontextprotocol/server-postgres"

mindmap:
  output_dir: "data/mindmaps"
  default_theme: default
  engine: mermaid

# ============================================================
# 云同步存储配置（v2.0 新增）
# ============================================================
# 设置 data_root 后，所有数据库/日志/对话/导图都存储在此路径下
# 将该路径放在坚果云/阿里云盘等同步文件夹中即可实现多设备同步
# data_root 为空时使用项目下的 data/ 目录
cloud_sync:
  enabled: true          # 启用 WAL 模式（云盘同步安全）
  data_root: ""          # 数据根目录，空=自动检测（推荐：D:/Nutstore/devPartner-data）
  sync_drive: auto       # auto/nutstore/alidrive/onedrive/custom
  wal_enabled: true      # WAL 模式：临时文件不参与云盘同步
  auto_checkpoint_interval: 1000
  db_backup_before_sync: true

# ============================================================
# 身份识别配置（v2.0 新增）
# ============================================================
identity:
  auto_detect: true      # 自动检测 AI 客户端身份
  auto_register: false   # 自动注册检测到的客户端（true=静默，false=需要确认）
  session_timeout_minutes: 120
