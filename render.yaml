# Render Blueprint 部署配置
# 自动从 GitHub 仓库部署 devPartner MCP 服务
# 文档: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: devpartner
    runtime: docker
    plan: free          # free / starter / standard
    region: singapore   # singapore 延迟最低（亚太）
    healthCheckPath: /health
    envVars:
      - key: DEVPARTNER_HOST
        value: "0.0.0.0"
      - key: DEVPARTNER_TRANSPORT
        value: sse
      - key: DEVPARTNER_MODE
        value: local
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DEVPARTNER_DATA_ROOT
        value: data
    # 注意: PORT 由 Render 自动注入，config.py 已做兼容处理
